<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | SecretWaifu</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #231f20;
      }

      #unity-canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #231f20;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <script>
      (function () {
        var nativeAlert = window.alert ? window.alert.bind(window) : null;
        var isSuppressedUnityPermissionError = function (value) {
          var text = String(value || "").toLowerCase();
          return text.includes("permissions check failed");
        };

        if (nativeAlert) {
          window.alert = function (message) {
            if (isSuppressedUnityPermissionError(message)) {
              console.warn("Suppressed Unity permission popup.", message);
              return;
            }

            nativeAlert(message);
          };
        }

        window.addEventListener("error", function (event) {
          if (!event || !isSuppressedUnityPermissionError(event.message)) {
            return;
          }

          event.preventDefault();
          console.warn("Suppressed Unity runtime permission error.", event.message);
        });

        window.addEventListener("unhandledrejection", function (event) {
          var reasonText = event && event.reason ? String(event.reason) : "";
          if (!isSuppressedUnityPermissionError(reasonText)) {
            return;
          }

          event.preventDefault();
          console.warn("Suppressed Unity permission rejection.", reasonText);
        });
      })();
    </script>
    <script src="Build/4e04d1a0f3ecc0a902304b9ea797f0c5.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function createFallbackPermissionStatus(state) {
        return {
          state: state || "prompt",
          onchange: null,
          addEventListener: function () {},
          removeEventListener: function () {},
          dispatchEvent: function () {
            return false;
          }
        };
      }

      function normalizePermissionStatus(status) {
        if (!status || typeof status !== "object") {
          return createFallbackPermissionStatus("prompt");
        }

        if (typeof status.addEventListener !== "function") {
          status.addEventListener = function () {};
        }
        if (typeof status.removeEventListener !== "function") {
          status.removeEventListener = function () {};
        }
        if (typeof status.dispatchEvent !== "function") {
          status.dispatchEvent = function () {
            return false;
          };
        }
        if (!("onchange" in status)) {
          status.onchange = null;
        }
        if (!status.state || typeof status.state !== "string") {
          status.state = "prompt";
        }

        return status;
      }
      var postToParent = function(type, payload) {
        if (!window.parent || window.parent === window) {
          return;
        }

        try {
          window.parent.postMessage(
            Object.assign(
              {
                type: "secretwaifu-webgl:" + type
              },
              payload || {}
            ),
            "*"
          );
        } catch (error) {
          console.warn("Unable to post WebGL progress to parent window.", error);
        }
      };

      // Some browsers or iframe permission policies can throw on Permissions API checks.
      // Keep Unity running by degrading to a PermissionStatus-like fallback.
      if (navigator.permissions && typeof navigator.permissions.query === 'function') {
        var originalPermissionsQuery = navigator.permissions.query.bind(navigator.permissions);
        navigator.permissions.query = function(permissionDescriptor) {
          try {
            return originalPermissionsQuery(permissionDescriptor)
              .then(function(status) {
                return normalizePermissionStatus(status);
              })
              .catch(function(error) {
                console.warn('Permissions query failed, using fallback state.', error);
                return createFallbackPermissionStatus('prompt');
              });
          } catch (error) {
            console.warn('Permissions query threw, using fallback state.', error);
            return Promise.resolve(createFallbackPermissionStatus('prompt'));
          }
        };
      }

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        canvas.style.width = "100%";
        canvas.style.height = "100%";
      }

      createUnityInstance(
        canvas,
        {
          arguments: [],
          dataUrl: "Build/adeaf0ef10f609f98fb47678bccddb6f.data",
          frameworkUrl: "Build/4ab1a6dd50d9d5b7f3dae4757a88ad5a.framework.js",
          codeUrl: "Build/1bd2838295f5a6220a0aeb1e26c27f3d.wasm",
          streamingAssetsUrl: "StreamingAssets",
          companyName: "Squircle Games",
          productName: "SecretWaifu",
          productVersion: "0.27",
          // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
          // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
        },
        function(progress) {
          postToParent("progress", { progress: progress });
        }
      ).then((unityInstance) => {
        var unityInstanceRef = unityInstance;

        window.addEventListener("message", function (event) {
          var data = event.data;
          if (!data || typeof data !== "object") {
            return;
          }

          if (data.type === "secretwaifu-auth:api-token" && data.token && typeof data.token === "string") {
            try {
              unityInstanceRef.SendMessage("AuthManager", "ReceiveWebGlApiToken", data.token);
            } catch (sendError) {
              console.warn("AuthManager.ReceiveWebGlApiToken SendMessage failed (Unity may not expose AuthManager yet).", sendError);
            }
          }

          if (data.type === "secretwaifu-auth:user" && data.user) {
            try {
              unityInstanceRef.SendMessage("AuthManager", "ReceiveWebGlUserJson", JSON.stringify(data.user));
            } catch (sendError) {
              console.warn("AuthManager.ReceiveWebGlUserJson SendMessage failed.", sendError);
            }
          }
        });

        postToParent("ready", { progress: 1 });
      }).catch((message) => {
        var errorText = String(message || "");
        if (errorText.toLowerCase().includes("permissions check failed")) {
          console.warn("Unity permissions check failed. Continuing with limited features.", errorText);
          return;
        }

        alert(errorText);
      });
    </script>
  </body>
</html>
